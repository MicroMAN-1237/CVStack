<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — CVStack</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">CV<span>Stack</span></a>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h1>تسجيل الدخول</h1>
      <p class="auth-sub">أهلاً بعودتك، تابع بناء سيرتك الذاتية</p>

      <form id="login-form">
        <label for="login-email">البريد الإلكتروني</label>
        <input type="email" id="login-email" required placeholder="example@email.com">

        <label for="login-password">كلمة المرور</label>
        <input type="password" id="login-password" required placeholder="كلمة المرور">

        <button type="submit" class="btn btn-primary btn-block">دخول</button>
      </form>

      <p id="auth-message" class="auth-message"></p>

      <p class="auth-switch">
        ما عندكش حساب؟ <a href="signup.html">أنشئ واحد</a>
      </p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", handleLogin);
  </script>

</body>
</html>
